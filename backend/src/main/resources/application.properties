# ─── Server ───────────────────────────────────────────────────────────────────
# Railway provides PORT automatically; locally defaults to 8081
server.port=${PORT:8081}

# ─── AI / Gemini ──────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:AIzaSyD8zrYwYAIOxlRNLEb6oA8fzJtQnKyVZwQ}

# ─── Database ─────────────────────────────────────────────────────────────────
# Railway MySQL env vars: MYSQLDATABASE, MYSQLHOST, MYSQLPASSWORD, MYSQLPORT, MYSQLUSER
# Falls back to local MySQL when running locally
spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:hms_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:nirmal}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGIN to your Netlify URL in Railway env vars
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.healtrack=INFO
logging.level.org.springframework.security=WARN

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
