# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8081}
server.address=0.0.0.0

gemini.api.key=${GEMINI_API_KEY:AIzaSyB0x6CHHVmXuIrcoyauJoAIpDdiDJy8GHQ}

# ─── Database ─────────────────────────────────────────────────────────────────
# DataSource is configured fully in DataSourceConfig.java — do NOT set
# spring.datasource.url here, it conflicts with custom DataSource bean parsing.
# Disable Spring Boot's SQL initializer (we use JPA ddl-auto instead)
spring.sql.init.mode=never

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.healtrack=INFO
logging.level.org.springframework.security=WARN

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ─── Email Notification (Gmail SMTP) ──────────────────────────────────────────
