# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8081}

# ─── AI / Gemini ──────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:AIzaSyD8zrYwYAIOxlRNLEb6oA8fzJtQnKyVZwQ}

# ─── Database ─────────────────────────────────────────────────────────────────
# ⚠️ DATABASE_URL must start with "jdbc:" e.g.:
#   jdbc:postgresql://ep-xxx.neon.tech/hms_db?user=xxx&password=xxx&sslmode=require
# Local fallback uses MySQL:
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:nirmal}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.healtrack=INFO
logging.level.org.springframework.security=WARN

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
