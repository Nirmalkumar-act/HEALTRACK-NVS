# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8081}
server.address=0.0.0.0

# ─── AI / Gemini ──────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:AIzaSyD8zrYwYAIOxlRNLEb6oA8fzJtQnKyVZwQ}

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:nirmal}

# Hikari — don't crash at startup if DB is temporarily unreachable
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=3

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.healtrack=INFO
logging.level.org.springframework.security=WARN

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
